version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lianghuo-postgres
    environment:
      POSTGRES_DB: lianghuo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lianghuo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lianghuo-redis
    ports:
      - "6379:6379"
    networks:
      - lianghuo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lianghuo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lianghuo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lianghuo-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/lianghuo
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:5173"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    networks:
      - lianghuo-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lianghuo-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/lianghuo
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECRET: "false"
      DEBUG: "true"
    networks:
      - lianghuo-network
    depends_on:
      - api
      - redis
    command: celery -A tasks worker -l info -Q default,media,export

  flower:
    image: mher/flower:2
    container_name: lianghuo-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    networks:
      - lianghuo-network
    depends_on:
      - redis
      - celery-worker

networks:
  lianghuo-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: